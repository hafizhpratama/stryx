name: Publish to npm

# Manual-only. Once the maintainer has:
#   1. Created the npm account and reserved `stryx` (or chosen a
#      different name in crates/stryx_napi/package.json)
#   2. Generated an automation token at npmjs.com
#   3. Added it as the `NPM_TOKEN` secret in this repo's settings
# ...they can run this workflow against an existing `v*` tag whose
# Release.yml run has already attached the prebuilt `.node` files.
#
# Why not auto-fire on tag push? Three reasons:
#   - First publish needs human confirmation (the npm namespace is
#     permanent once claimed)
#   - The prebuilt-binary download path here pulls from the GitHub
#     Release attached by release.yml, which must complete first
#   - Tag-push automation should fail-closed on missing secrets;
#     this design fails-open by simply never running
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.2.1)"
        required: true
        type: string
      dry_run:
        description: "Run `npm publish --dry-run` only (recommended for first try)"
        required: false
        default: true
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish ${{ inputs.tag }} to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install napi-rs CLI
        working-directory: crates/stryx_napi
        run: npm ci

      # Download every `stryx.*.node` file from the GitHub Release
      # attached by release.yml. `gh release download` resolves the
      # tag and pulls the asset list; we filter to .node files only.
      - name: Download prebuilt .node binaries from GitHub Release
        working-directory: crates/stryx_napi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p .release-artifacts
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern 'stryx.*.node' \
            --pattern 'index.js' \
            --pattern 'index.d.ts' \
            --dir .release-artifacts
          ls -la .release-artifacts/
          # napi-rs prepublish looks for these files at the crate
          # root. The `.node` files are platform-specific; index.js
          # is the napi-generated loader that picks the right
          # subpackage at runtime; index.d.ts is the TypeScript
          # declarations. All three were uploaded by release.yml.
          cp .release-artifacts/stryx.*.node .
          cp .release-artifacts/index.js .
          cp .release-artifacts/index.d.ts .
          ls -la stryx.*.node index.js index.d.ts

      # napi-rs CLI v3 split the v2 monolithic `prepublish` into
      # three smaller commands. We run them explicitly so the
      # flow is auditable:
      #
      # 1. `create-npm-dirs` writes `npm/<platform>/package.json`
      #    for each declared target (with cpu / os / libc fields).
      # 2. `artifacts -d .` copies the `.node` files (which we
      #    staged into the crate root from the GH Release in the
      #    previous step) into the matching `npm/<platform>/` dirs.
      # 3. `pre-publish` writes the `optionalDependencies` block on
      #    the main package.json. `--skip-optional-publish` is
      #    needed because the default behaviour is to run
      #    `npm view <subpackage>@<version>` to verify each
      #    optional dep was already published — but we publish the
      #    subpackages later in this same workflow, so the check
      #    would always 404 on first release.
      - name: Create npm platform dirs
        working-directory: crates/stryx_napi
        run: npx napi create-npm-dirs

      - name: Copy .node files into platform dirs
        working-directory: crates/stryx_napi
        run: npx napi artifacts -d .

      - name: Patch main package.json with optionalDependencies
        working-directory: crates/stryx_napi
        run: npx napi pre-publish -t npm --skip-optional-publish

      # Bundle the standalone Rust `stryx` CLI binary into each
      # platform subpackage. The release.yml workflow builds and
      # uploads `stryx-<ver>-<target>.{tar.gz,zip}` archives for
      # every supported target; we download them here, extract,
      # and copy the binary into the matching `npm/<dir>/` so the
      # main package's `bin/stryx.js` spawn wrapper can find it.
      #
      # Without this step, the npm distribution only ships the
      # napi `.node` library, which the (pre-v0.4.1) JS shim
      # called directly — losing the full CLI surface (default
      # scan, --verbose, --diff, grouped output, score, surfaces,
      # STRYX_DEBUG_DUMP). Bundling the binary keeps the npm
      # experience byte-identical with `cargo install` + GitHub
      # Release downloads.
      - name: Bundle CLI binaries into platform subpackages
        working-directory: crates/stryx_napi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ inputs.tag }}"
          version="${version#v}"
          # Parallel arrays — TARGETS[i] is the Rust triple,
          # DIRS[i] is the matching `npm/<dir>/` (napi-rs platform
          # name). Stay in lockstep with the `napi.targets` list
          # in package.json and with the case statement in
          # `bin/stryx.js::platformPackageName()`.
          TARGETS=( \
            x86_64-apple-darwin \
            aarch64-apple-darwin \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu \
            x86_64-pc-windows-msvc \
          )
          DIRS=( \
            darwin-x64 \
            darwin-arm64 \
            linux-x64-gnu \
            linux-arm64-gnu \
            win32-x64-msvc \
          )
          mkdir -p .release-cli
          for i in "${!TARGETS[@]}"; do
            target="${TARGETS[$i]}"
            dir="${DIRS[$i]}"
            archive="stryx-${version}-${target}"
            if [[ "$target" == "x86_64-pc-windows-msvc" ]]; then
              asset="${archive}.zip"
              binname="stryx.exe"
            else
              asset="${archive}.tar.gz"
              binname="stryx"
            fi
            echo "::group::bundle $target → npm/$dir/$binname"
            gh release download "${{ inputs.tag }}" \
              --repo "${{ github.repository }}" \
              --pattern "$asset" \
              --dir .release-cli \
              --clobber
            rm -rf ".release-cli/extracted-$dir"
            mkdir -p ".release-cli/extracted-$dir"
            if [[ "$asset" == *.zip ]]; then
              unzip -q ".release-cli/$asset" -d ".release-cli/extracted-$dir"
            else
              tar -xzf ".release-cli/$asset" -C ".release-cli/extracted-$dir"
            fi
            cp ".release-cli/extracted-$dir/$archive/$binname" "npm/$dir/$binname"
            chmod +x "npm/$dir/$binname" || true
            # Patch the subpackage's package.json `files` array to
            # include the binary, otherwise `npm publish` would skip
            # it and the spawn wrapper would `ENOENT` on install.
            node -e "
              const fs = require('fs');
              const path = 'npm/${dir}/package.json';
              const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
              const have = new Set(pkg.files || []);
              have.add('${binname}');
              pkg.files = Array.from(have);
              fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "::endgroup::"
          done
          echo "platform subpackages now contain:"
          ls -la npm/*/

      - name: Publish platform subpackages
        if: ${{ !inputs.dry_run }}
        working-directory: crates/stryx_napi/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -uo pipefail
          failed=()
          for d in */; do
            name=$(node -p "require('./$d/package.json').name")
            version=$(node -p "require('./$d/package.json').version")
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "skip $d — ${name}@${version} already published"
              continue
            fi
            echo "publishing $d"
            if ! (cd "$d" && npm publish --access public); then
              failed+=("$d")
            fi
          done
          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "::error::subpackages failed to publish: ${failed[*]}"
            exit 1
          fi

      - name: Publish main package
        if: ${{ !inputs.dry_run }}
        working-directory: crates/stryx_napi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -uo pipefail
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "skip — ${name}@${version} already published"
            exit 0
          fi
          npm publish --access public

      # Dry-run path — useful for the first execution to confirm
      # the prepublish output and the file list before touching npm.
      - name: Dry-run main package
        if: ${{ inputs.dry_run }}
        working-directory: crates/stryx_napi
        run: |
          set -euo pipefail
          echo "=== npm/ subpackages that would be published ==="
          for d in npm/*/; do
            echo
            echo "--- $d ---"
            (cd "$d" && npm publish --dry-run --access public 2>&1 | tail -40)
          done
          echo
          echo "=== main package dry-run ==="
          npm publish --dry-run --access public 2>&1 | tail -60

      - name: Summary
        run: |
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "::notice::Dry run complete — no packages published. Re-run with dry_run=false to actually publish."
          else
            echo "::notice::Published ${{ inputs.tag }} to npm (main package + platform subpackages)."
          fi
